server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers. CSP notes: style-src 'unsafe-inline' is required for React
    # inline style props (react-zoom-pan-pinch); img-src https: covers the R2
    # presigned image URLs; frame-src https: allows Auth0's silent-auth iframe;
    # frame-ancestors 'none' prevents clickjacking. TLS is expected to be
    # terminated by the hosting platform in front of this server.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https:; frame-src https:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # add_header in a location block discards inherited headers — repeat them.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https:; frame-src https:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=()" always;
    }
}
